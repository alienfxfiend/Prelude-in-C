name: Pool Game Auto Release

on:
  push:
    paths:
      - 'Yahoo-8Ball-Pool-Clone/**.exe'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Manually specify version number (e.g., 70)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  release-pool-exe:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find Latest Pool EXE
        id: find-exe
        run: |
          cd Yahoo-8Ball-Pool-Clone
          LATEST_EXE=$(ls Yahoo-8Ball-Pool-CloneV*.exe 2>/dev/null | sort -V | tail -n1)
          if [ -z "$LATEST_EXE" ]; then
            echo "No Pool Game EXE files found!"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "found=true" >> $GITHUB_OUTPUT
          echo "filename=$LATEST_EXE" >> $GITHUB_OUTPUT
          echo "full_path=Yahoo-8Ball-Pool-Clone/$LATEST_EXE" >> $GITHUB_OUTPUT
          VERSION_NUM=$(echo "$LATEST_EXE" | grep -oP 'V\K\d+')
          echo "version=$VERSION_NUM" >> $GITHUB_OUTPUT
          echo "Latest Pool EXE: $LATEST_EXE (Version: $VERSION_NUM)"

      - name: Find Source Code Folder
        id: find-source
        if: steps.find-exe.outputs.found == 'true'
        run: |
          VERSION="${{ steps.find-exe.outputs.version }}"
          # Look for folders ending with V## (e.g., "Rare Aiming Misfire... V69")
          SOURCE_FOLDER=$(find Yahoo-8Ball-Pool-Clone -maxdepth 1 -type d -regex ".*V${VERSION}$" | head -n1)
          if [ -z "$SOURCE_FOLDER" ]; then
            # Try case‑insensitive match
            SOURCE_FOLDER=$(find Yahoo-8Ball-Pool-Clone -maxdepth 1 -type d -iregex ".*v${VERSION}$" | head -n1)
          fi
          if [ -z "$SOURCE_FOLDER" ]; then
            echo "No source folder found for V${VERSION}"
            echo "source_found=false" >> $GITHUB_OUTPUT
          else
            SOURCE_NAME=$(basename "$SOURCE_FOLDER")
            echo "source_found=true" >> $GITHUB_OUTPUT
            echo "source_folder=$SOURCE_FOLDER" >> $GITHUB_OUTPUT
            echo "source_name=$SOURCE_NAME" >> $GITHUB_OUTPUT
            FILE_COUNT=$(find "$SOURCE_FOLDER" -type f | wc -l)
            echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
            echo "Found source folder: $SOURCE_FOLDER ($FILE_COUNT files)"
          fi

      - name: Create Source Code Zip
        id: create-zip
        if: steps.find-source.outputs.source_found == 'true'
        run: |
          VERSION="${{ steps.find-exe.outputs.version }}"
          SOURCE_FOLDER="${{ steps.find-source.outputs.source_folder }}"
          ZIP_NAME="Yahoo-8Ball-Pool-Clone-V${VERSION}-Source.zip"
          cd Yahoo-8Ball-Pool-Clone
          SOURCE_DIR_NAME=$(basename "$SOURCE_FOLDER")
          zip -r "../${ZIP_NAME}" "$SOURCE_DIR_NAME"
          cd ..
          ZIP_SIZE=$(stat -c%s "$ZIP_NAME" 2>/dev/null || echo "unknown")
          ZIP_SIZE_MB=$(echo "scale=2; $ZIP_SIZE / 1048576" | bc 2>/dev/null || echo "unknown")
          echo "zip_path=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "zip_size_mb=$ZIP_SIZE_MB" >> $GITHUB_OUTPUT
          echo "Created source zip: $ZIP_NAME ($ZIP_SIZE_MB MB)"

      - name: Get File Details
        id: file-details
        if: steps.find-exe.outputs.found == 'true'
        run: |
          FILE_PATH="${{ steps.find-exe.outputs.full_path }}"
          FILE_SIZE=$(stat -c%s "$FILE_PATH" 2>/dev/null || echo "unknown")
          FILE_SIZE_MB=$(echo "scale=2; $FILE_SIZE / 1048576" | bc 2>/dev/null || echo "unknown")
          echo "size_bytes=$FILE_SIZE" >> $GITHUB_OUTPUT
          echo "size_mb=$FILE_SIZE_MB" >> $GITHUB_OUTPUT
          COMMIT_MSG=$(git log -1 --pretty=%B)
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git log -1 --pretty=%ci)
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "commit_date=$COMMIT_DATE" >> $GITHUB_OUTPUT

      - name: Create Release Tag
        if: steps.find-exe.outputs.found == 'true'
        id: tag
        run: |
          VERSION="${{ steps.find-exe.outputs.version }}"
          TAG_NAME="pool-v${VERSION}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME exists, removing..."
            git tag -d "$TAG_NAME"
            git push origin ":refs/tags/$TAG_NAME" 2>/dev/null || true
          fi
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      # Release WITH source code (when source folder was found)
      - name: Create GitHub Release (with Source Code)
        if: steps.find-exe.outputs.found == 'true' && steps.find-source.outputs.source_found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "🎱 Yahoo 8 Ball Pool Clone - V${{ steps.find-exe.outputs.version }}"
          body: |
            # 🎱 Yahoo 8 Ball Pool Clone - V${{ steps.find-exe.outputs.version }}

            ![Pool Game](https://img.shields.io/badge/Version-${{ steps.find-exe.outputs.version }}-blue)
            ![Platform](https://img.shields.io/badge/Platform-Windows%2010%20x64-lightgrey)
            ![Source](https://img.shields.io/badge/Source_Code-Included-green)

            ---

            ### 📋 Release Details

            | Detail | Info |
            |--------|------|
            | **Game EXE** | `${{ steps.find-exe.outputs.filename }}` |
            | **EXE Size** | ${{ steps.file-details.outputs.size_mb }} MB |
            | **Source Code** | `${{ steps.create-zip.outputs.zip_path }}` |
            | **Source Size** | ${{ steps.create-zip.outputs.zip_size_mb }} MB |
            | **Source Files** | ${{ steps.find-source.outputs.file_count }} files |
            | **Source Folder** | `${{ steps.find-source.outputs.source_name }}` |
            | **Platform** | Windows 10 x64 |
            | **Release Date** | ${{ steps.file-details.outputs.commit_date }} |
            | **Commit** | `${{ steps.file-details.outputs.commit_sha }}` |

            ### 📦 Downloads

            | File | Description |
            |------|-------------|
            | `${{ steps.find-exe.outputs.filename }}` | 🎮 **Game executable** – Download and play! |
            | `${{ steps.create-zip.outputs.zip_path }}` | 📁 **Source code** – Full project source |

            ### 🚀 How to Run
            1. Download `${{ steps.find-exe.outputs.filename }}` from the assets below
            2. Double-click the executable to launch the game
            3. No installation required – runs directly as a standalone application!
            4. Enjoy the game! 🎱

            ### 🛠️ Building from Source
            1. Download `${{ steps.create-zip.outputs.zip_path }}` from the assets below
            2. Extract the zip file
            3. Open the project in Visual Studio
            4. Build and run!

            ### 📝 Changelog
            ```
            ${{ steps.file-details.outputs.commit_msg }}
            ```

            ### ⚠️ Notes
            - **Windows 10 x64** or later required
            - May trigger Windows SmartScreen on first run (click “More Info” → “Run Anyway”)
            - This is a standalone executable – no installation or extraction needed
            - Report any issues on the [Issues page](https://github.com/alienfxfiend/Prelude-in-C/issues)

            ---
            *Auto-generated release from your latest Pool Game build*
          files: |
            ${{ steps.find-exe.outputs.full_path }}
            ${{ steps.create-zip.outputs.zip_path }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Fallback: Release WITHOUT source code
      - name: Create GitHub Release (without Source)
        if: steps.find-exe.outputs.found == 'true' && steps.find-source.outputs.source_found != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "🎱 Yahoo 8 Ball Pool Clone - V${{ steps.find-exe.outputs.version }}"
          body: |
            # 🎱 Yahoo 8 Ball Pool Clone - V${{ steps.find-exe.outputs.version }}

            ![Pool Game](https://img.shields.io/badge/Version-${{ steps.find-exe.outputs.version }}-blue)
            ![Platform](https://img.shields.io/badge/Platform-Windows%2010%20x64-lightgrey)

            ---

            ### 📋 Release Details

            | Detail | Info |
            |--------|------|
            | **File** | `${{ steps.find-exe.outputs.filename }}` |
            | **Size** | ${{ steps.file-details.outputs.size_mb }} MB |
            | **Platform** | Windows 10 x64 |
            | **Release Date** | ${{ steps.file-details.outputs.commit_date }} |
            | **Commit** | `${{ steps.file-details.outputs.commit_sha }}` |

            ### 📦 Download
            Click the **${{ steps.find-exe.outputs.filename }}** file below to download.

            ### 🚀 How to Run
            1. Download `${{ steps.find-exe.outputs.filename }}` from the assets below
            2. Double-click the executable to launch the game
            3. No installation required – runs directly as a standalone application!
            4. Enjoy the game! 🎱

            ### 📝 Changelog
            ```
            ${{ steps.file-details.outputs.commit_msg }}
            ```

            ### ⚠️ Notes
            - **Windows 10 x64** or later required
            - May trigger Windows SmartScreen on first run (click “More Info” → “Run Anyway”)
            - This is a standalone executable – no installation or extraction needed
            - Source code available in the [repository folder](https://github.com/alienfxfiend/Prelude-in-C/tree/main/Yahoo-8Ball-Pool-Clone)
            - Report any issues on the [Issues page](https://github.com/alienfxfiend/Prelude-in-C/issues)

            ---
            *Auto-generated release from your latest Pool Game build*
          files: ${{ steps.find-exe.outputs.full_path }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        if: steps.find-exe.outputs.found == 'true'
        run: |
          echo "========================================="
          echo "✅ RELEASE CREATED SUCCESSFULLY!"
          echo "========================================="
          echo "Game:   Yahoo 8 Ball Pool Clone V${{ steps.find-exe.outputs.version }}"
          echo "EXE:    ${{ steps.find-exe.outputs.filename }}"
          echo "Size:   ${{ steps.file-details.outputs.size_mb }} MB"
          echo "Source: ${{ steps.find-source.outputs.source_found }}"
          if [ "${{ steps.find-source.outputs.source_found }}" = "true" ]; then
            echo "Folder: ${{ steps.find-source.outputs.source_name }}"
            echo "Zip:    ${{ steps.create-zip.outputs.zip_path }}"
            echo "Files:  ${{ steps.find-source.outputs.file_count }} source files"
          fi
          echo "Tag:    ${{ steps.tag.outputs.tag }}"
          echo "========================================="
          echo "Check your Releases page:"
          echo "https://github.com/alienfxfiend/Prelude-in-C/releases"
          echo "========================================="
